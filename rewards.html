<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rewards Store - Digital Earner</title>
    <link rel="icon" href="logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef1f7;
            min-height: 100vh;
            overflow-x: hidden;
            animation: fadeSlideUp 1s ease-out;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        body.menu-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .header-container {
    position: relative;
    width: 100%;
    margin: 0;
    padding: 0;
}

.header-bg {
    background: #e0e5ec;
    box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
    border-radius: 0 0 20px 20px;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    z-index: 1;
}

.header-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px;
    height: 70px;
}

.header-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.logo-img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    position: relative;
    top: -3px;
    left: -10px;
}

.brand-text {
    font-size: 22px;
    font-weight: 800;
    color: #1e40af;
    text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    white-space: nowrap;
    position: relative;
    top: 0px;
    left: -15px;
}

.menu-btn {
    width: 40px;
    height: 40px;
    background: #e0e5ec;
    border: none;
    border-radius: 10px;
    color: #4f46e5;
    font-size: 20px;
    cursor: pointer;
    box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
    transition: .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    top: 0px;
    right: -8px;
    z-index: 3;
    padding: 0;
}

.menu-btn:active {
    box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
}

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 999;
            pointer-events: none;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: none;
        }

        .menu-container {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            background: #e0e5ec;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            padding: 20px 15px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
            border-radius: 25px 0 0 25px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .menu-container.active {
            right: 0;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-box {
            background: #e0e5ec;
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            transition: 0.3s;
        }

        .menu-box.digital-box {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .digital-title {
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            text-shadow: 2px 2px 4px #a3b1c6, -2px -2px 4px #ffffff;
            white-space: nowrap;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            background: #e0e5ec;
            border: none;
            border-radius: 10px;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .close-btn:active {
            box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
        }

        .menu-link {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #333333;
            text-decoration: none;
            padding: 8px 5px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .menu-link:hover {
            color: #e67e22;
            padding-left: 15px;
            background: #f0f3ff;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            color: #333;
            margin: 25px 0 15px;
            text-align: center;
            white-space: nowrap;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 0 20px 25px 20px;
        }
        
        .product-card {
            background: #e0e5ec;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
            transition: 0.3s;
        }
        
        .product-card:active {
            box-shadow: inset 8px 8px 15px #a3b1c6, inset -8px -8px 15px #ffffff;
        }
        
        .product-image {
            width: 100%;
            height: 120px;
            background: #e0e5ec;
            border-radius: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #1e40af;
            box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
        }
        
        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .product-title {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 5px;
        }
        
        .product-desc {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }
        
        .task-requirement {
            background: #1e40af;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin: 12px 0;
            text-align: center;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .claim-btn {
            background: #e0e5ec;
            border: none;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            color: #1e40af;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            font-size: 16px;
            transition: 0.2s;
        }
        
        .claim-btn:active {
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
        }
        
        .claim-btn.clicked {
            animation: btnPop 0.3s ease;
        }
        
        @keyframes btnPop {
            0% { transform: scale(1); }
            50% { transform: scale(0.95); box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff; }
            100% { transform: scale(1); }
        }
        
        .featured-product {
            background: linear-gradient(145deg, #1e40af, #4f46e5);
            border-radius: 25px;
            padding: 25px;
            margin: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
        }
        
        .featured-image {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        
        .featured-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        
        .featured-info h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .featured-info p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .featured-task {
            background: rgba(255,255,255,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 600;
            font-size: 12px;
            width: fit-content;
        }
        
        .offer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px;
        }
        
        .offer-card {
            background: #e0e5ec;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
        }
        
        .offer-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }
        
        .offer-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .offer-desc {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 10px;
        }
        
        .offer-task {
            background: #10b981;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin: 10px 0;
            text-align: center;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .claim-offer-btn {
            background: #e0e5ec;
            border: none;
            border-radius: 8px;
            padding: 8px;
            width: 100%;
            color: #1e40af;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            transition: 0.2s;
        }
        
        .claim-offer-btn:active {
            box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
        }
        
        .reward-popup {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 12px 16px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-size: 14px;
            font-weight: 600;
            color: #1e40af;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            text-align: center;
            border-left: 5px solid #10b981;
            white-space: normal;
            word-break: break-word;
            transform: translateY(20px);
        }
        
        .reward-popup.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        
        .reward-popup span {
            color: #10b981;
            font-size: 20px;
            margin-right: 8px;
        }
        
        .footer {
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 18px 20px;
            margin-top: 40px;
            font-size: 14px;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #1e40af;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="menu-container" id="menu">
    <div class="menu-items">
        <div class="menu-box digital-box">
            <span class="digital-title">Digital Earner</span>
            <button class="close-btn" onclick="closeMenuOnly()">✕</button>
        </div>
        
        <div class="menu-box" onclick="goToDashboard()">
    <span class="menu-link">← Back</span>
</div>
        
        <div class="menu-box">
            <a href="index.html" class="menu-link">🏠 Home</a>
        </div>
        <div class="menu-box">
            <a href="about.html" class="menu-link">📖 About Us</a>
        </div>
        <div class="menu-box">
            <a href="https://wa.me/917217392800" class="menu-link" target="_blank">📞 Contact Us</a>
        </div>
        <div class="menu-box">
            <a href="how-it-works.html" class="menu-link">❓ How It Works</a>
        </div>
    </div>
</div>

<div class="header-container">
    <div class="header-bg"></div>
    <div class="header-content">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">Digital Earner</span>
        </div>
        <button class="menu-btn" onclick="openMenuOnly()">☰</button>
    </div>
</div>

<div class="featured-product">
    <div class="featured-image">
        <img src="airpods.jpg" alt="AirPods Pro" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
    </div>
    <div class="featured-info">
        <h3>🔥 AirPods Pro</h3>
        <p>Wireless, Noise Cancellation, Spatial Audio</p>
        <div class="featured-task" id="airpodsTask">Loading...</div>
    </div>
</div>

<div class="section-title">✨ Best Rewards This Month ✨</div>

<div class="products-grid" id="productsGrid">
    <!-- Products will be loaded dynamically -->
</div>

<div class="section-title">🎯 Special Offers</div>

<div class="offer-grid" id="offersGrid">
    <!-- Offers will be loaded dynamically -->
</div>

<div class="reward-popup" id="rewardPopup">
    <span>🎯</span> <span id="popupMessage"></span>
</div>

<div class="footer">
    <p>© 2026 Digital Earner · All rights reserved</p>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    
    const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
    const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
    const supabase = createClient(supabaseUrl, supabaseKey)
    
    let completedTasks = 0
    
    // Rewards data
    const rewards = [
        { name: "Gaming Mouse", desc: "RGB, 6400 DPI, 6 Buttons", img: "mouse.jpg", required: 10 },
        { name: "Smart Watch", desc: "Heart Rate, Steps, Sleep Tracker", img: "watch.jpg", required: 12 },
        { name: "Wireless Headphones", desc: "Over-ear, Deep Bass, 30hr Battery", img: "headphone.jpg", required: 14 },
        { name: "Amazon Gift Card", desc: "₹500 Value • Shop Anything", img: "amazon.jpg", required: 5 },
        { name: "Flipkart Voucher", desc: "₹400 Off • Minimum Purchase", img: "flipkart.jpg", required: 6 },
        { name: "Bluetooth Speaker", desc: "Portable, 10W, LED Lights", img: "speaker.jpg", required: 8 },
        { name: "Power Bank", desc: "10000mAh, Fast Charging", img: "powerbank.jpg", required: 7 },
        { name: "TWS Earbuds", desc: "Bluetooth 5.3, 20hrs Battery", img: "earbuds.jpg", required: 9 }
    ]
    
    const offers = [
        { name: "Double Rewards", desc: "Get 2x value on next claim", icon: "🔥", required: 10 },
        { name: "Early Bird Bonus", desc: "Extra gift on first 5 tasks", icon: "⚡", required: 5 }
    ]
    
    async function protectPage() {
        const { data } = await supabase.auth.getSession()
        if (!data.session) {
            window.location.replace("login.html")
        }
        return data.session
    }
    
    async function loadCompletedTasks() {
        const session = await protectPage()
        const user = session.user
        
        const { data: referrals, error } = await supabase
            .from('referrals')
            .select('status')
            .eq('referrer_id', user.id)
            .eq('status', 'success')
        
        if (error) {
            console.error("Error loading tasks:", error)
            return 0
        }
        
        return referrals?.length || 0
    }
    
    function getRemainingText(required) {
        const remaining = required - completedTasks
        if (remaining <= 0) {
            return "✅ Unlocked! You can claim this reward!"
        }
        return `📌 ${remaining} more tasks to unlock`
    }
    
    function showPopup(message) {
        const popup = document.getElementById('rewardPopup');
        const msgSpan = document.getElementById('popupMessage');
        msgSpan.textContent = message;
        popup.classList.add('show');
        
        setTimeout(() => {
            popup.classList.remove('show');
        }, 3000);
    }
    
    function handleClaim(rewardName, required) {
        const remaining = required - completedTasks
        
        if (remaining <= 0) {
            showPopup(`🎉 Congratulations! You have unlocked ${rewardName}! 🎉`);
        } else {
            showPopup(`🎯 Complete ${remaining} more tasks to unlock ${rewardName}!`);
        }
    }
    
    function renderRewards() {
        const productsGrid = document.getElementById('productsGrid')
        const offersGrid = document.getElementById('offersGrid')
        
        // Render products
        productsGrid.innerHTML = rewards.map(reward => `
            <div class="product-card">
                <div class="product-image">
                    <img src="${reward.img}" alt="${reward.name}" style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
                </div>
                <div class="product-title">${reward.name}</div>
                <div class="product-desc">${reward.desc}</div>
                <div class="task-requirement">${getRemainingText(reward.required)}</div>
                <button class="claim-btn" data-reward="${reward.name}" data-req="${reward.required}">Claim</button>
            </div>
        `).join('')
        
        // Render offers
        offersGrid.innerHTML = offers.map(offer => `
            <div class="offer-card">
                <div class="offer-icon">${offer.icon}</div>
                <div class="offer-title">${offer.name}</div>
                <div class="offer-desc">${offer.desc}</div>
                <div class="offer-task">${getRemainingText(offer.required)}</div>
                <button class="claim-offer-btn" data-reward="${offer.name}" data-req="${offer.required}">Claim</button>
            </div>
        `).join('')
        
        // Update AirPods task text
        document.getElementById('airpodsTask').textContent = getRemainingText(50)
        
        // Add event listeners to all claim buttons
        document.querySelectorAll('.claim-btn, .claim-offer-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                
                this.classList.add('clicked');
                setTimeout(() => {
                    this.classList.remove('clicked');
                }, 300);
                
                const reward = this.getAttribute('data-reward');
                const required = parseInt(this.getAttribute('data-req'));
                handleClaim(reward, required);
            });
        });
    }
    
    async function init() {
        // Show loading
        document.getElementById('productsGrid').innerHTML = '<div style="text-align:center; padding:40px;"><div class="loading-spinner"></div> Loading rewards...</div>'
        
        completedTasks = await loadCompletedTasks()
        renderRewards()
    }
    
    function openMenuOnly() {
        document.getElementById('menu').classList.add('active');
        document.getElementById('overlay').classList.add('active');
        document.body.classList.add('menu-open');
        document.body.style.top = `-${window.scrollY}px`;
    }

    function closeMenuOnly() {
        document.getElementById('menu').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        document.body.classList.remove('menu-open');
        const scrollY = document.body.style.top;
        document.body.style.top = '';
        window.scrollTo(0, parseInt(scrollY || '0') * -1);
    }

    function goToDashboard() {
        window.location.href = "dashboard.html";
    }
    
    window.openMenuOnly = openMenuOnly
    window.closeMenuOnly = closeMenuOnly
    window.goToDashboard = goToDashboard
    
    init()
</script>

</body>
</html>
