<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Claims - Digital Earner</title>
    <link rel="icon" href="logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #eef2ff);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.menu-open {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .header-container {
            position: relative;
            width: 100%;
        }

        .header-bg {
            background: #e0e5ec;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            border-radius: 0 0 20px 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            z-index: 1;
        }

        .header-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 20px;
            height: 70px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .brand-text {
            font-size: 22px;
            font-weight: 800;
            color: #1e40af;
            text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            white-space: nowrap;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            background: #e0e5ec;
            border: none;
            border-radius: 10px;
            color: #4f46e5;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            z-index: 999;
            pointer-events: none;
        }

        .overlay.active {
            opacity: 1;
            visibility: visible;
            pointer-events: none;
        }

        .menu-container {
            position: fixed;
            top: 0;
            right: -300px;
            width: 280px;
            background: #e0e5ec;
            transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            padding: 20px 15px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
            border-radius: 25px 0 0 25px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .menu-container.active {
            right: 0;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-box {
            background: #e0e5ec;
            border-radius: 12px;
            padding: 10px 15px;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            transition: 0.3s;
        }

        .menu-box.digital-box {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .digital-title {
            font-size: 20px;
            font-weight: bold;
            color: #e67e22;
            text-shadow: 2px 2px 4px #a3b1c6, -2px -2px 4px #ffffff;
            white-space: nowrap;
        }

        .close-btn {
            width: 36px;
            height: 36px;
            background: #e0e5ec;
            border: none;
            border-radius: 10px;
            color: #ef4444;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .menu-link {
            display: block;
            font-size: 16px;
            font-weight: 600;
            color: #333333;
            text-decoration: none;
            padding: 8px 5px;
            border-radius: 6px;
            transition: 0.2s;
            cursor: pointer;
        }

        .admin-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 15px 20px;
        }

        .admin-title {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }

        .claims-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .claim-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 5px solid #f59e0b;
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef2ff;
        }

        .claim-id {
            font-size: 14px;
            color: #64748b;
        }

        .claim-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .claim-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
            margin-top: 2px;
        }

        .screenshot-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #e0e5ec;
            border-radius: 30px;
            font-size: 12px;
            color: #4f46e5;
            text-decoration: none;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .approve-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .reject-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .approve-btn:disabled, .reject-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .no-claims {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .footer {
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 18px 20px;
            margin-top: 30px;
            font-size: 12px;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="menu-container" id="menu">
    <div class="menu-items">
        <div class="menu-box digital-box">
            <span class="digital-title">Digital Earner</span>
            <button class="close-btn" onclick="closeMenuOnly()">✕</button>
        </div>
        <div class="menu-box" onclick="goToDashboard()">
            <span class="menu-link">← Back to Dashboard</span>
        </div>
        <div class="menu-box">
            <a href="index.html" class="menu-link">🏠 Home</a>
        </div>
        <div class="menu-box">
            <a href="about.html" class="menu-link">📖 About Us</a>
        </div>
        <div class="menu-box">
            <a href="how-it-works.html" class="menu-link">❓ How It Works</a>
        </div>
        <div class="menu-box">
            <span class="menu-link" onclick="confirmLogout()">🚪 Logout</span>
        </div>
    </div>
</div>

<div class="header-container">
    <div class="header-bg"></div>
    <div class="header-content">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="logo-img">
            <span class="brand-text">Digital Earner</span>
        </div>
        <button class="menu-btn" onclick="openMenuOnly()">☰</button>
    </div>
</div>

<div class="admin-container">
    <div class="admin-title">📋 Pending Claims</div>
    <div id="claimsList" class="claims-list">
        <div style="text-align: center; padding: 40px;">Loading claims...</div>
    </div>
</div>

<div class="footer">
    © 2026 Digital Earner · Admin Panel · All rights reserved
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    
    const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
    const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
    const supabase = createClient(supabaseUrl, supabaseKey)
    
    const ADMIN_EMAIL = "digitalearner.business@gmail.com"
    
    async function checkAdmin() {
        const { data: { user } } = await supabase.auth.getUser()
        if (!user) {
            window.location.href = "login.html"
            return false
        }
        if (user.email !== ADMIN_EMAIL) {
            alert("Access denied. Admin only.")
            window.location.href = "dashboard.html"
            return false
        }
        return true
    }
    
    async function loadClaims() {
        const { data: claims, error } = await supabase
            .from('claim_requests')
            .select('*')
            .eq('status', 'pending')
            .order('submitted_at', { ascending: false })
        
        const container = document.getElementById('claimsList')
        
        if (error || !claims || claims.length === 0) {
            container.innerHTML = '<div class="no-claims">✅ No pending claims</div>'
            return
        }
        
        let html = ''
        for (const claim of claims) {
            const date = new Date(claim.submitted_at).toLocaleString()
            
            // Extract filename from URL to delete later
            let screenshotPath = null
            if (claim.proof_screenshot) {
                const urlParts = claim.proof_screenshot.split('/')
                screenshotPath = urlParts.slice(-2).join('/') // claims/filename.jpg
            }
            
            html += `
                <div class="claim-item" id="claim-${claim.id}">
                    <div class="claim-header">
                        <span class="claim-id">#${claim.id}</span>
                        <span class="claim-date">${date}</span>
                        <span class="status-badge status-pending">Pending</span>
                    </div>
                    <div class="claim-details">
                        <div class="detail-item">
                            <span class="detail-label">Name</span>
                            <span class="detail-value">${escapeHtml(claim.user_name)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Email</span>
                            <span class="detail-value">${escapeHtml(claim.user_email)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Mobile</span>
                            <span class="detail-value">${escapeHtml(claim.user_mobile)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Broker</span>
                            <span class="detail-value">${escapeHtml(claim.broker_name)}</span>
                        </div>
                    </div>
                    ${claim.proof_screenshot ? `<a href="${claim.proof_screenshot}" target="_blank" class="screenshot-link">📸 View Screenshot</a>` : '<div class="screenshot-link" style="opacity:0.5;">📸 No screenshot</div>'}
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approveClaim(${claim.id}, '${claim.user_id}', '${screenshotPath || ''}')">✅ Approve</button>
                        <button class="reject-btn" onclick="rejectClaim(${claim.id}, '${screenshotPath || ''}')">❌ Reject</button>
                    </div>
                </div>
            `
        }
        container.innerHTML = html
    }
    
    function escapeHtml(str) {
        if (!str) return ''
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;'
            if (m === '<') return '&lt;'
            if (m === '>') return '&gt;'
            return m
        })
    }
    
    // Delete screenshot from storage
    async function deleteScreenshot(filePath) {
        if (!filePath) return true
        try {
            const { error } = await supabase.storage
                .from('claim-proofs')
                .remove([filePath])
            if (error) console.error("Delete screenshot error:", error)
            return !error
        } catch (err) {
            console.error("Delete screenshot error:", err)
            return false
        }
    }
    
    window.approveClaim = async function(claimId, userId, screenshotPath) {
        if (!confirm("Approve this claim? ₹100 will be added to user's wallet.")) return
        
        const btn = document.querySelector(`#claim-${claimId} .approve-btn`)
        const rejectBtn = document.querySelector(`#claim-${claimId} .reject-btn`)
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        if (rejectBtn) rejectBtn.disabled = true
        
        try {
            // Update claim status
            await supabase
                .from('claim_requests')
                .update({ status: 'approved', reviewed_at: new Date().toISOString() })
                .eq('id', claimId)
            
            // Add ₹100 to user's earnings
            const { data: earnings, error: earningsError } = await supabase
    .from('user_earnings')
    .select('*')
    .eq('user_id', userId)
    .single()

if (earningsError && earningsError.code === 'PGRST116') {
    // ❗ user ka record exist nahi karta → create new
    await supabase.from('user_earnings').insert({
        user_id: userId,
        today_earnings: 100,
        week_earnings: 100,
        month_earnings: 100,
        total_earnings: 100,
        available_balance: 100
    })
} else if (earnings) {
    // ✅ already exist → update
    await supabase
        .from('user_earnings')
        .update({
            today_earnings: (earnings.today_earnings || 0) + 100,
            week_earnings: (earnings.week_earnings || 0) + 100,
            month_earnings: (earnings.month_earnings || 0) + 100,
            total_earnings: (earnings.total_earnings || 0) + 100,
            available_balance: (earnings.available_balance || 0) + 100
        })
        .eq('user_id', userId)
}
            
            if (earnings) {
                await supabase
                    .from('user_earnings')
                    .update({
                        today_earnings: (earnings.today_earnings || 0) + 100,
                        week_earnings: (earnings.week_earnings || 0) + 100,
                        month_earnings: (earnings.month_earnings || 0) + 100,
                        total_earnings: (earnings.total_earnings || 0) + 100,
                        available_balance: (earnings.available_balance || 0) + 100
                    })
                    .eq('user_id', userId)
            }
            
            // Update referral status to success
            await supabase
                .from('referrals')
                .update({ status: 'success', completed_at: new Date().toISOString() })
                .eq('referred_user_id', userId)
                .eq('status', 'pending')
            
            // Delete screenshot from storage (free space)
            await deleteScreenshot(screenshotPath)
            
            // Delete claim record from database
            await supabase
                .from('claim_requests')
                .delete()
                .eq('id', claimId)
            
            alert("✅ Claim approved! ₹100 added. Record deleted.")
            loadClaims()
            
        } catch (err) {
            alert("Error approving claim")
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '✅ Approve'
            }
            if (rejectBtn) rejectBtn.disabled = false
        }
    }
    
    window.rejectClaim = async function(claimId, screenshotPath) {
        if (!confirm("Reject this claim? Screenshot will be deleted.")) return
        
        const btn = document.querySelector(`#claim-${claimId} .reject-btn`)
        const approveBtn = document.querySelector(`#claim-${claimId} .approve-btn`)
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        if (approveBtn) approveBtn.disabled = true
        
        try {
            // Delete screenshot from storage
            await deleteScreenshot(screenshotPath)
            
            // Delete claim record from database
            await supabase
                .from('claim_requests')
                .delete()
                .eq('id', claimId)
            
            // Update referral status to rejected
            await supabase
                .from('referrals')
                .update({ status: 'rejected', rejected_at: new Date().toISOString() })
                .eq('referred_user_id', claimId)
                .eq('status', 'pending')
            
            alert("❌ Claim rejected. Record deleted.")
            loadClaims()
            
        } catch (err) {
            alert("Error rejecting claim")
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '❌ Reject'
            }
            if (approveBtn) approveBtn.disabled = false
        }
    }
    
    function openMenuOnly() {
        document.getElementById('menu').classList.add('active')
        document.getElementById('overlay').classList.add('active')
        document.body.classList.add('menu-open')
        document.body.style.top = `-${window.scrollY}px`
    }

    function closeMenuOnly() {
        document.getElementById('menu').classList.remove('active')
        document.getElementById('overlay').classList.remove('active')
        document.body.classList.remove('menu-open')
        const scrollY = document.body.style.top
        document.body.style.top = ''
        window.scrollTo(0, parseInt(scrollY || '0') * -1)
    }

    function goToDashboard() {
        window.location.href = 'dashboard.html'
    }
    
    window.confirmLogout = async function() {
        if (confirm("Are you sure you want to logout?")) {
            await supabase.auth.signOut()
            window.location.href = 'login.html'
        }
    }
    
    checkAdmin().then(() => loadClaims())
</script>

</body>
</html>
