<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Claims - Digital Earner</title>
    <link rel="icon" href="logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #eef2ff);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .admin-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 15px 20px;
        }

        .admin-title {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Summary Card Styles */
        .summary-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            color: white;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
            opacity: 0.9;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .summary-item {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        .summary-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 800;
        }

        .summary-value.pending { color: #f59e0b; }
        .summary-value.approved { color: #10b981; }
        .summary-value.rejected { color: #ef4444; }

        .claims-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .claim-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 5px solid #f59e0b;
        }

        .claim-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef2ff;
        }

        .claim-id {
            font-size: 14px;
            color: #64748b;
        }

        .claim-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            background: #fef3c7;
            color: #d97706;
        }

        .claim-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
            margin-top: 2px;
        }

        .referred-section {
            background: #f0fdf4;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            border-left: 3px solid #10b981;
        }

        .referred-title {
            font-size: 12px;
            font-weight: 700;
            color: #059669;
            margin-bottom: 8px;
        }

        .screenshot-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #e0e5ec;
            border-radius: 30px;
            font-size: 12px;
            color: #4f46e5;
            text-decoration: none;
            box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .approve-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .reject-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .approve-btn:disabled, .reject-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-claims {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 14px;
            text-align: center;
            z-index: 3000;
            animation: slideUp 0.3s ease;
            display: none;
        }
        .toast-message.success { background: #10b981; }
        .toast-message.error { background: #ef4444; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-title">📋 Claims Management</div>
    
    <!-- Summary Card -->
    <div class="summary-card" id="summaryCard" style="display: none;">
        <div class="summary-title">📊 CLAIMS SUMMARY</div>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="summary-label">Pending</div>
                <div class="summary-value pending" id="pendingAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Approved</div>
                <div class="summary-value approved" id="approvedAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Rejected</div>
                <div class="summary-value rejected" id="rejectedAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Total Claims</div>
                <div class="summary-value" id="totalClaims">0</div>
            </div>
        </div>
    </div>
    
    <div id="claimsList" class="claims-list">
        <div style="text-align: center; padding: 40px;">Loading claims...</div>
    </div>
</div>

<div id="toastMessage" class="toast-message"></div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    
    const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
    const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
    const supabase = createClient(supabaseUrl, supabaseKey)
    
    // Admin email (private)
    const ADMIN_EMAIL = "raoshadman.business@gmail.com"
    
    function showToast(message, type = 'success') {
        const toast = document.getElementById('toastMessage')
        toast.textContent = message
        toast.className = `toast-message ${type}`
        toast.style.display = 'block'
        setTimeout(() => {
            toast.style.display = 'none'
        }, 3000)
    }
    
    // ==================== SECURITY: Check Admin from admins table ====================
    async function checkAdmin() {
        const { data: { user } } = await supabase.auth.getUser()
        if (!user) {
            window.location.href = "login.html"
            return false
        }
        
        const { data: adminData, error } = await supabase
            .from('admins')
            .select('email')
            .eq('email', user.email)
            .single()
        
        if (error || !adminData) {
            alert("⛔ ACCESS DENIED!\n\nThis page is for authorized admins only.")
            window.location.href = "dashboard.html"
            return false
        }
        
        return true
    }
    
    // ==================== LOAD SUMMARY STATS ====================
    async function loadSummary() {
        const { data: allClaims, error } = await supabase
            .from('claim_requests')
            .select('status, amount')
        
        if (error) {
            console.error("Error loading summary:", error)
            return
        }
        
        let pendingTotal = 0
        let approvedTotal = 0
        let rejectedTotal = 0
        let pendingCount = 0
        let approvedCount = 0
        let rejectedCount = 0
        
        const claimAmount = 100
        
        for (const claim of allClaims) {
            if (claim.status === 'pending') {
                pendingTotal += claimAmount
                pendingCount++
            } else if (claim.status === 'approved') {
                approvedTotal += claimAmount
                approvedCount++
            } else if (claim.status === 'rejected') {
                rejectedTotal += claimAmount
                rejectedCount++
            }
        }
        
        document.getElementById('pendingAmount').innerHTML = `₹${pendingTotal.toLocaleString()}`
        document.getElementById('approvedAmount').innerHTML = `₹${approvedTotal.toLocaleString()}`
        document.getElementById('rejectedAmount').innerHTML = `₹${rejectedTotal.toLocaleString()}`
        document.getElementById('totalClaims').textContent = allClaims.length
        
        document.getElementById('summaryCard').style.display = 'block'
    }
    
    async function loadClaims() {
        const { data: claims, error } = await supabase
            .from('claim_requests')
            .select('*')
            .eq('status', 'pending')
            .order('submitted_at', { ascending: false })
        
        const container = document.getElementById('claimsList')
        
        if (error || !claims || claims.length === 0) {
            container.innerHTML = '<div class="no-claims">✅ No pending claims</div>'
            return
        }
        
        let html = ''
        for (const claim of claims) {
            const date = new Date(claim.submitted_at).toLocaleString()
            
            let screenshotPath = null
            if (claim.proof_screenshot) {
                const urlParts = claim.proof_screenshot.split('/')
                screenshotPath = urlParts.slice(-2).join('/')
            }
            
            html += `
                <div class="claim-item" id="claim-${claim.id}">
                    <div class="claim-header">
                        <span class="claim-id">#${claim.id}</span>
                        <span class="claim-date">${date}</span>
                        <span class="status-badge">PENDING</span>
                    </div>
                    <div class="claim-details">
                        <div class="detail-item">
                            <span class="detail-label">Claimant Name</span>
                            <span class="detail-value">${escapeHtml(claim.user_name)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Claimant Email</span>
                            <span class="detail-value">${escapeHtml(claim.user_email)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Claimant Mobile</span>
                            <span class="detail-value">${escapeHtml(claim.user_mobile)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Broker</span>
                            <span class="detail-value">${escapeHtml(claim.broker_name)}</span>
                        </div>
                    </div>
                    <div class="referred-section">
                        <div class="referred-title">🎯 Referred User Details (जिसके लिए claim किया)</div>
                        <div class="claim-details" style="margin-bottom: 0;">
                            <div class="detail-item">
                                <span class="detail-label">Name</span>
                                <span class="detail-value">${escapeHtml(claim.referred_name) || '—'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Mobile</span>
                                <span class="detail-value">${escapeHtml(claim.referred_mobile) || '—'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Email</span>
                                <span class="detail-value">${escapeHtml(claim.referred_email) || '—'}</span>
                            </div>
                        </div>
                    </div>
                    ${claim.proof_screenshot ? `<a href="${claim.proof_screenshot}" target="_blank" class="screenshot-link">📸 View Screenshot</a>` : '<div class="screenshot-link" style="opacity:0.5;">📸 No screenshot</div>'}
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approveClaim(${claim.id}, '${claim.user_id}', '${screenshotPath || ''}', '${escapeHtml(claim.referred_email) || ''}', '${escapeHtml(claim.referred_name) || ''}', '${escapeHtml(claim.referred_mobile) || ''}')">✅ Approve & Add ₹100</button>
                        <button class="reject-btn" onclick="rejectClaim(${claim.id}, '${screenshotPath || ''}')">❌ Reject</button>
                    </div>
                </div>
            `
        }
        container.innerHTML = html
    }
    
    function escapeHtml(str) {
        if (!str) return ''
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;'
            if (m === '<') return '&lt;'
            if (m === '>') return '&gt;'
            return m
        })
    }
    
    async function deleteScreenshot(filePath) {
        if (!filePath) return true
        try {
            const { error } = await supabase.storage
                .from('claim-proofs')
                .remove([filePath])
            if (error) console.error("Delete screenshot error:", error)
            return !error
        } catch (err) {
            console.error("Delete screenshot error:", err)
            return false
        }
    }
    
    window.approveClaim = async function(claimId, claimantUserId, screenshotPath, referredEmail, referredName, referredMobile) {
        if (!confirm("✅ Confirm: Approve this claim? ₹100 will be added to claimant's wallet.")) return
        
        const btn = document.querySelector(`#claim-${claimId} .approve-btn`)
        const rejectBtn = document.querySelector(`#claim-${claimId} .reject-btn`)
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        if (rejectBtn) rejectBtn.disabled = true
        
        try {
            // ==================== SECURITY: Verify admin ====================
            const { data: { user } } = await supabase.auth.getUser()
            const { data: adminCheck } = await supabase
                .from('admins')
                .select('email')
                .eq('email', user.email)
                .single()
            
            if (!adminCheck) {
                throw new Error("Unauthorized access")
            }
            
            // ==================== SAFE: Add ₹100 using Supabase Function (Server-side) ====================
            const { data: earningsResult, error: earningsError } = await supabase.rpc('add_earnings_safe', {
                p_user_id: claimantUserId,
                p_amount: 100,
                p_reason: 'claim_approval'
            })
            
            if (earningsError) {
                console.error("Earnings function error:", earningsError)
                throw new Error("Failed to add earnings: " + earningsError.message)
            }
            
            if (!earningsResult || !earningsResult.success) {
                throw new Error(earningsResult?.message || "Failed to add earnings")
            }
            
            // ==================== Save referral record ====================
            if (referredEmail && referredEmail !== '') {
                await supabase
                    .from('referrals')
                    .insert({
                        referrer_id: claimantUserId,
                        referred_user_email: referredEmail,
                        referred_user_name: referredName || '',
                        referred_user_mobile: referredMobile || '',
                        broker_name: 'Broker',
                        commission_amount: 100,
                        status: 'success',
                        completed_at: new Date().toISOString()
                    })
            }
            
            // ==================== Update claim status ====================
            await supabase
                .from('claim_requests')
                .update({ status: 'approved', reviewed_at: new Date().toISOString() })
                .eq('id', claimId)
            
            // ==================== Delete screenshot from storage ====================
            await deleteScreenshot(screenshotPath)
            
            // ==================== Delete claim record ====================
            await supabase
                .from('claim_requests')
                .delete()
                .eq('id', claimId)
            
            showToast("✅ Claim approved! ₹100 added to claimant's wallet.", "success")
            loadSummary()
            loadClaims()
            
        } catch (err) {
            console.error("Approve error:", err)
            showToast("Error approving claim: " + err.message, "error")
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '✅ Approve & Add ₹100'
            }
            if (rejectBtn) rejectBtn.disabled = false
        }
    }
    
    window.rejectClaim = async function(claimId, screenshotPath) {
        if (!confirm("❌ Reject this claim? Screenshot will be deleted.")) return
        
        const btn = document.querySelector(`#claim-${claimId} .reject-btn`)
        const approveBtn = document.querySelector(`#claim-${claimId} .approve-btn`)
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        if (approveBtn) approveBtn.disabled = true
        
        try {
            const { data: { user } } = await supabase.auth.getUser()
            const { data: adminCheck } = await supabase
                .from('admins')
                .select('email')
                .eq('email', user.email)
                .single()
            
            if (!adminCheck) {
                throw new Error("Unauthorized access")
            }
            
            await deleteScreenshot(screenshotPath)
            
            await supabase
                .from('claim_requests')
                .delete()
                .eq('id', claimId)
            
            showToast("❌ Claim rejected. Record deleted.", "success")
            loadSummary()
            loadClaims()
            
        } catch (err) {
            console.error("Reject error:", err)
            showToast("Error rejecting claim: " + err.message, "error")
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '❌ Reject'
            }
            if (approveBtn) approveBtn.disabled = false
        }
    }
    
    // Initialize
    async function init() {
        const isAdmin = await checkAdmin()
        if (!isAdmin) return
        
        await loadSummary()
        await loadClaims()
    }
    
    init()
</script>

</body>
</html>
