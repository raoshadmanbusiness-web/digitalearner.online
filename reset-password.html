<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reset Password - Digital Earners</title>
  <link rel="icon" href="logo.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #e0e5ec;
      width: 100%;
      max-width: 450px;
      padding: 40px 25px;
      border-radius: 35px;
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a237e;
      text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #1a237e;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 1px 1px 2px #ffffff;
      margin-bottom: 20px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
      transition: 0.3s;
      color: #333;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: inset 7px 7px 15px #a3b1c6, inset -7px -7px 15px #ffffff;
    }

    .input-group input.error {
      box-shadow: inset 5px 5px 10px #ffb3b3, inset -5px -5px 10px #ffffff;
      border: 2px solid #ff6b6b;
    }

    .eye-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #1a237e;
      font-size: 20px;
      background: #e0e5ec;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .eye-btn:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    .error-text {
      color: #ff4757;
      font-size: 13px;
      margin-top: 5px;
      margin-left: 15px;
      font-weight: 600;
      display: none;
    }

    .btn-reset {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 800;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      transition: 0.3s;
      margin: 20px 0;
    }

    .btn-reset:active {
      box-shadow: inset 8px 8px 15px #a3b1c6, inset -8px -8px 15px #ffffff;
    }

    .success-message {
      text-align: center;
      color: #10b981;
      font-size: 16px;
      margin-top: 20px;
      display: none;
    }

    .login-link {
      text-align: center;
      margin-top: 20px;
      font-size: 15px;
      color: #333;
    }

    .login-link a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .login-link a:active {
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loader {
      width: 60px;
      height: 60px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      animation: pulse 1.5s infinite;
    }

    .loader div {
      width: 40px;
      height: 40px;
      border: 4px solid #1a237e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="logo">🔐</div>
    <h2>Reset Password</h2>
    <div class="subtitle">Enter your new password</div>
  </div>

  <div class="input-group">
    <input type="password" id="newPass" placeholder="New Password">
    <span class="eye-btn" onclick="togglePass('newPass')">👁️</span>
    <div id="newPassError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="password" id="confirmPass" placeholder="Confirm Password">
    <span class="eye-btn" onclick="togglePass('confirmPass')">👁️</span>
    <div id="confirmPassError" class="error-text"></div>
  </div>

  <button id="resetBtn" class="btn-reset">UPDATE PASSWORD</button>

  <div class="success-message" id="successMessage">
    ✓ Password updated successfully!
  </div>

  <div class="login-link">
    <a href="login.html">Back to Login</a>
  </div>

</div>

<div id="loading">
  <div class="loader">
    <div></div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

  const supabaseUrl = "https://clbasxqamthvxrtnuqht.supabase.co"
  const supabaseKey = "sb_publishable_TQ1uOFcqdY2hOdONCmwUtw_ZfqysYAe"
  const supabase = createClient(supabaseUrl, supabaseKey)

  window.togglePass = (id) => {
    const input = document.getElementById(id)
    input.type = input.type === "password" ? "text" : "password"
  }

  function showError(inputId, errorId, message) {
    const input = document.getElementById(inputId)
    const error = document.getElementById(errorId)
    
    input.classList.add('error')
    error.textContent = message
    error.style.display = 'block'
    
    setTimeout(() => {
      input.classList.remove('error')
      error.style.display = 'none'
    }, 3000)
  }

  // Get the access token from URL
  const hashParams = new URLSearchParams(window.location.hash.substring(1))
  const accessToken = hashParams.get('access_token')
  const type = hashParams.get('type')

  if (!accessToken || type !== 'recovery') {
    document.body.innerHTML = '<div style="text-align: center; margin-top: 50px; color: #1a237e;"><h2>Invalid or expired reset link</h2><p>Please request a new password reset link.</p><a href="login.html" style="color: #1a237e;">Back to Login</a></div>'
    throw new Error('Invalid access')
  }

  document.getElementById("resetBtn").addEventListener("click", async () => {
    const newPass = document.getElementById("newPass").value
    const confirmPass = document.getElementById("confirmPass").value

    if (!newPass) {
      showError('newPass', 'newPassError', 'Please enter new password')
      return
    }
    if (newPass.length < 6) {
      showError('newPass', 'newPassError', 'Password must be at least 6 characters')
      return
    }
    if (!confirmPass) {
      showError('confirmPass', 'confirmPassError', 'Please confirm your password')
      return
    }
    if (newPass !== confirmPass) {
      showError('confirmPass', 'confirmPassError', 'Passwords do not match')
      return
    }

    document.getElementById("loading").style.display = "flex"

    try {
      const { error } = await supabase.auth.updateUser({
        password: newPass
      })

      if (error) {
        alert(error.message)
      } else {
        document.getElementById("successMessage").style.display = "block"
        setTimeout(() => {
          window.location.href = "login.html"
        }, 3000)
      }
    } catch (e) {
      alert("Something went wrong")
    }

    document.getElementById("loading").style.display = "none"
  })
</script>

</body>
</html>
