<!DOCTYPE html>
<html>
<head>
    <title>Update Password - Digital Earner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #e0e5ec;
            max-width: 400px;
            padding: 40px;
            border-radius: 35px;
            box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 20px;
            background: #e0e5ec;
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 30px;
            background: #e0e5ec;
            font-size: 16px;
            font-weight: bold;
            color: #1a237e;
            cursor: pointer;
            box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
        }
        button:active {
            box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .success { background: #d1fae5; color: #065f46; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        h2 { color: #1a237e; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔐 Create New Password</h2>
    <input type="password" id="password" placeholder="New Password (min 6 chars)">
    <input type="password" id="confirm" placeholder="Confirm Password">
    <button id="updateBtn">Update Password</button>
    <div id="message" class="message"></div>
    <p style="margin-top: 20px;"><a href="login.html" style="color:#1a237e;">← Back to Login</a></p>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    const supabase = createClient("https://yqxbwgxfhibbdkgglydw.supabase.co", "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V")
    
    document.getElementById('updateBtn').onclick = async () => {
        const password = document.getElementById('password').value.trim()
        const confirm = document.getElementById('confirm').value.trim()
        const msgDiv = document.getElementById('message')
        
        if (!password) {
            msgDiv.className = 'message error'
            msgDiv.textContent = 'Please enter new password'
            return
        }
        
        if (password.length < 6) {
            msgDiv.className = 'message error'
            msgDiv.textContent = 'Password must be at least 6 characters'
            return
        }
        
        if (password !== confirm) {
            msgDiv.className = 'message error'
            msgDiv.textContent = 'Passwords do not match'
            return
        }
        
        document.getElementById('updateBtn').disabled = true
        document.getElementById('updateBtn').textContent = 'Updating...'
        
        const { error } = await supabase.auth.updateUser({ password: password })
        
        if (error) {
            msgDiv.className = 'message error'
            msgDiv.textContent = error.message
        } else {
            msgDiv.className = 'message success'
            msgDiv.textContent = '✅ Password updated! Redirecting to login...'
            setTimeout(() => { window.location.href = 'login.html' }, 2000)
        }
        
        document.getElementById('updateBtn').disabled = false
        document.getElementById('updateBtn').textContent = 'Update Password'
    }
</script>
</body>
</html>
