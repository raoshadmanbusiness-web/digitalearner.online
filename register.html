<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Register - Digital Earners</title>
  <link rel="icon" href="logo.png">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: pan-y pan-x;
    }

    .container {
      background: #e0e5ec;
      width: 100%;
      max-width: 450px;
      padding: 40px 25px;
      border-radius: 35px;
      box-shadow: 10px 10px 20px #a3b1c6, -10px -10px 20px #ffffff;
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      position: relative;
    }

    .logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 45px;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: 0.3s;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .logo span {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 45px;
    }

    .camera-icon {
      position: absolute;
      top: 60px;
      right: 110px;
      width: 32px;
      height: 32px;
      background: #4f46e5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      border: 2px solid white;
      z-index: 10;
      transition: 0.2s;
    }

    .camera-icon:hover {
      background: #6366f1;
      transform: scale(1.1);
    }

    #profileUpload {
      display: none;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 800;
      color: #1a237e;
      text-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #1a237e;
      font-weight: 600;
      font-size: 15px;
      text-shadow: 1px 1px 2px #ffffff;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      background: #e0e5ec;
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
      transition: 0.3s;
      color: #333;
    }

    .input-group input:focus {
      outline: none;
      box-shadow: inset 7px 7px 15px #a3b1c6, inset -7px -7px 15px #ffffff;
    }

    .input-group input.error {
      box-shadow: inset 5px 5px 10px #ffb3b3, inset -5px -5px 10px #ffffff;
      border: 2px solid #ff4757;
    }

    .eye-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #1a237e;
      font-size: 20px;
      background: #e0e5ec;
      width: 35px;
      height: 35px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .get-sponsor {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #1a237e;
      cursor: pointer;
      font-weight: 600;
      padding: 8px 15px;
      border-radius: 30px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
      white-space: nowrap;
    }

    .error-text {
      color: #ff4757;
      font-size: 13px;
      margin-top: 5px;
      margin-left: 15px;
      font-weight: 500;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .btn-register {
      width: 100%;
      background: #e0e5ec;
      border: none;
      padding: 18px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 800;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      transition: 0.3s;
      margin-top: 30px;
    }

    .btn-register:active {
      box-shadow: inset 5px 5px 10px #a3b1c6, inset -5px -5px 10px #ffffff;
    }

    .login-text {
      margin-top: 25px;
      font-size: 15px;
      color: #333;
      text-align: center;
      text-shadow: 1px 1px 2px #ffffff;
    }

    .login-text a {
      color: #1a237e;
      text-decoration: none;
      font-weight: 700;
      margin-left: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      background: #e0e5ec;
      box-shadow: 3px 3px 6px #a3b1c6, -3px -3px 6px #ffffff;
    }

    .email-suggestions {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #e0e5ec;
      border-radius: 15px;
      margin-top: 5px;
      padding: 10px;
      box-shadow: 5px 5px 10px #a3b1c6, -5px -5px 10px #ffffff;
      z-index: 10;
      display: none;
    }

    .email-suggestions.show {
      display: block;
    }

    .suggestion-item {
      padding: 10px 15px;
      border-radius: 10px;
      margin: 5px 0;
      cursor: pointer;
      transition: 0.2s;
      color: #1a237e;
      font-weight: 500;
    }

    .suggestion-item:hover {
      background: #d1d9e6;
      box-shadow: inset 3px 3px 6px #a3b1c6, inset -3px -3px 6px #ffffff;
    }

    #loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(5px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loader {
      width: 60px;
      height: 60px;
      background: #e0e5ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 8px 8px 15px #a3b1c6, -8px -8px 15px #ffffff;
      animation: pulse 1.5s infinite;
    }

    .loader div {
      width: 40px;
      height: 40px;
      border: 4px solid #1a237e;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  
  <div class="header">
    <div class="logo" id="profileLogo" onclick="document.getElementById('profileUpload').click()">
      <img src="" alt="Profile" id="profileImg" style="display: none;">
      <span id="profileInitial">👤</span>
    </div>
    <div class="camera-icon" onclick="document.getElementById('profileUpload').click()">📷</div>
    <input type="file" id="profileUpload" accept="image/jpeg,image/png,image/gif,image/webp" onchange="uploadProfileImage(event)" style="display: none;">
    
    <h2>Register With Us</h2>
    <div class="subtitle">Zero Investment • Lifetime Free</div>
  </div>

  <div class="input-group">
    <input type="text" id="name" placeholder="Full Name">
    <div id="nameError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="tel" id="mobile" placeholder="Mobile Number" maxlength="10">
    <div id="mobileError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email ID" autocomplete="off">
    <div id="emailError" class="error-text"></div>
    <div class="email-suggestions" id="emailSuggestions"></div>
  </div>

  <div class="input-group">
    <input type="password" id="pass" placeholder="Password">
    <span class="eye-btn" onclick="togglePass('pass')">👁️</span>
    <div id="passError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="password" id="cpass" placeholder="Confirm Password">
    <span class="eye-btn" onclick="togglePass('cpass')">👁️</span>
    <div id="cpassError" class="error-text"></div>
  </div>

  <div class="input-group">
    <input type="text" id="sponsor" placeholder="Sponsor ID">
    <span class="get-sponsor" onclick="getSponsor()">Get Sponsor ID</span>
    <div id="sponsorError" class="error-text"></div>
  </div>

  <button id="regBtn" class="btn-register">CREATE ACCOUNT</button>

  <div class="login-text">
    Already have an account? <a href="login.html">Login</a>
  </div>

</div>

<div id="loading">
  <div class="loader">
    <div></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
const supabase = createClient(supabaseUrl, supabaseKey)

const BUCKET_NAME = "profile-images"
let tempImageFile = null
let tempImageFileName = null

async function checkUser(){
  const { data:{ session } } = await supabase.auth.getSession()
  if(session){
    window.location.replace("dashboard.html")
  }
}
checkUser()

const FIXED_SPONSOR_ID = "DGTENSHA73@"

window.togglePass = (id) => {
  const input = document.getElementById(id)
  input.type = input.type === "password" ? "text" : "password"
}

window.getSponsor = () => {
  window.location.href = "https://wa.me/917217392800?text=Hello%20I%20need%20Sponsor%20ID";
}

// ==================== IMPROVED IMAGE UPLOAD VALIDATION ====================
window.uploadProfileImage = async function(event) {
  const file = event.target.files[0]
  if (!file) return
  
  // Allowed file types
  const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp']
  const allowedExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp']
  const maxSizeMB = 2
  const maxSizeBytes = maxSizeMB * 1024 * 1024
  
  // Check file type
  if (!allowedTypes.includes(file.type)) {
    alert(`❌ Invalid file type!\n\nSupported formats: JPG, PNG, GIF, WEBP\n\nPlease select a valid image file.`)
    document.getElementById('profileUpload').value = ''
    return
  }
  
  // Check file size
  if (file.size > maxSizeBytes) {
    const fileSizeMB = (file.size / (1024 * 1024)).toFixed(2)
    alert(`❌ File too large!\n\nYour file: ${fileSizeMB}MB\nMaximum allowed: ${maxSizeMB}MB\n\nPlease compress your image or choose a smaller one.`)
    document.getElementById('profileUpload').value = ''
    return
  }
  
  document.getElementById("loading").style.display = "flex"
  
  try {
    const reader = new FileReader()
    reader.onload = function(e) {
      const img = document.getElementById("profileImg")
      const initial = document.getElementById("profileInitial")
      img.src = e.target.result
      img.style.display = "block"
      initial.style.display = "none"
    }
    reader.readAsDataURL(file)
    
    tempImageFile = file
    tempImageFileName = file.name
    
    // Show success message briefly
    const fileName = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name
    alert(`✅ Image selected successfully!\n\n📸 ${fileName}\n📦 Size: ${(file.size / 1024).toFixed(1)}KB\n\nImage will be uploaded after registration.`)
    
  } catch (error) {
    console.error("Image read error:", error)
    alert("❌ Failed to read image file. Please try again.")
  } finally {
    document.getElementById("loading").style.display = "none"
  }
}

function validateName(name) {
  const re = /^[A-Za-z\s]+$/
  return re.test(name)
}

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
  return re.test(email)
}

function validateMobile(mobile) {
  const re = /^[6-9]\d{9}$/
  return re.test(mobile)
}

const emailInput = document.getElementById('email')
const suggestionsBox = document.getElementById('emailSuggestions')
const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 'rediffmail.com']

emailInput.addEventListener('input', function() {
  const value = this.value
  const atIndex = value.indexOf('@')
  
  if (atIndex !== -1) {
    const localPart = value.substring(0, atIndex)
    const domainPart = value.substring(atIndex + 1)
    
    if (domainPart.length === 0) {
      suggestionsBox.innerHTML = ''
      const div = document.createElement('div')
      div.className = 'suggestion-item'
      div.textContent = localPart + '@gmail.com'
      div.onclick = () => {
        emailInput.value = localPart + '@gmail.com'
        suggestionsBox.classList.remove('show')
      }
      suggestionsBox.appendChild(div)
      suggestionsBox.classList.add('show')
    } else {
      const matchedDomains = domains.filter(d => d.startsWith(domainPart))
      
      if (matchedDomains.length > 0) {
        suggestionsBox.innerHTML = ''
        matchedDomains.forEach(domain => {
          const div = document.createElement('div')
          div.className = 'suggestion-item'
          div.textContent = localPart + '@' + domain
          div.onclick = () => {
            emailInput.value = localPart + '@' + domain
            suggestionsBox.classList.remove('show')
          }
          suggestionsBox.appendChild(div)
        })
        suggestionsBox.classList.add('show')
      } else {
        suggestionsBox.classList.remove('show')
      }
    }
  } else {
    suggestionsBox.classList.remove('show')
  }
})

document.addEventListener('click', function(e) {
  if (!emailInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
    suggestionsBox.classList.remove('show')
  }
})

function showError(inputId, errorId, message) {
  const input = document.getElementById(inputId)
  const error = document.getElementById(errorId)
  
  input.classList.add('error')
  error.textContent = message
  error.style.display = 'block'
  
  setTimeout(() => {
    input.classList.remove('error')
    error.style.display = 'none'
  }, 3000)
}

document.getElementById('name').addEventListener('input', function() {
  if (this.value.length > 0 && !validateName(this.value)) {
    document.getElementById('nameError').textContent = 'Please enter a valid name (letters only)'
    document.getElementById('nameError').style.display = 'block'
    this.classList.add('error')
  } else {
    document.getElementById('nameError').style.display = 'none'
    this.classList.remove('error')
  }
})

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('focus', function() {
    this.classList.remove('error')
    const errorId = this.id + 'Error'
    const errorEl = document.getElementById(errorId)
    if (errorEl) {
      errorEl.style.display = 'none'
    }
  })
})

document.getElementById("regBtn").addEventListener("click", async () => {

  const name = document.getElementById("name").value.trim()
  const mobile = document.getElementById("mobile").value.trim()
  const email = document.getElementById("email").value.trim()
  const pass = document.getElementById("pass").value
  const cpass = document.getElementById("cpass").value
  const sponsor = document.getElementById("sponsor").value.trim()

  if(!name){
    document.getElementById('name').focus()
    showError('name', 'nameError', 'This field is required')
    return
  }

  if(!mobile){
    document.getElementById('mobile').focus()
    showError('mobile', 'mobileError', 'This field is required')
    return
  }

  if(!email){
    document.getElementById('email').focus()
    showError('email', 'emailError', 'This field is required')
    return
  }

  if(!pass){
    document.getElementById('pass').focus()
    showError('pass', 'passError', 'This field is required')
    return
  }

  if(!cpass){
    document.getElementById('cpass').focus()
    showError('cpass', 'cpassError', 'This field is required')
    return
  }

  if(!sponsor){
    document.getElementById('sponsor').focus()
    showError('sponsor', 'sponsorError', 'This field is required')
    return
  }

  if (!validateName(name)) {
    document.getElementById('name').focus()
    showError('name', 'nameError', 'Please enter a valid name (letters only)')
    return
  }

  if (mobile.length !== 10) {
    document.getElementById('mobile').focus()
    showError('mobile', 'mobileError', 'Mobile number must be 10 digits')
    return
  }
  if (!validateMobile(mobile)) {
    document.getElementById('mobile').focus()
    showError('mobile', 'mobileError', 'Enter a valid Indian mobile number')
    return
  }

  if (!validateEmail(email)) {
    document.getElementById('email').focus()
    showError('email', 'emailError', 'Please enter a valid email address')
    return
  }

  if(pass.length < 6){
    document.getElementById('pass').focus()
    showError('pass', 'passError', 'Password must be at least 6 characters')
    return
  }

  if(pass !== cpass){
    document.getElementById('cpass').focus()
    showError('cpass', 'cpassError', 'Passwords do not match')
    return
  }

  if(sponsor !== FIXED_SPONSOR_ID){
    document.getElementById('sponsor').focus()
    showError('sponsor', 'sponsorError', 'Invalid sponsor ID')
    return
  }

  document.getElementById("loading").style.display = "flex"

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: pass,
    options: {
      data: {
        full_name: name,
        mobile: mobile
      }
    }
  })

  if(error){
    alert("❌ Registration failed: " + error.message)
    document.getElementById("loading").style.display = "none"
    return
  }

  // Upload profile image if selected (optional)
  if (tempImageFile && data.user) {
    try {
      const { error: uploadError } = await supabase
        .storage
        .from(BUCKET_NAME)
        .upload(`${data.user.id}/profile.jpg`, tempImageFile, {
          cacheControl: '3600',
          upsert: true,
          contentType: tempImageFile.type
        })
      
      if (uploadError) {
        console.error("Image upload failed:", uploadError)
        // Don't block registration if image upload fails
      } else {
        tempImageFile = null
      }
    } catch (uploadError) {
      console.error("Image upload failed:", uploadError)
    }
  }

  document.getElementById("loading").style.display = "none"
  localStorage.setItem('hasAccount', 'true')
  
  alert("✅ Registration successful! Welcome to Digital Earner 🎉\n\nYou can now login and start earning.")
  window.location.replace("dashboard.html")
})

</script>

</body>
</html>
