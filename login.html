<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - Digital Earners</title>
  <link rel="icon" href="logo.png">
  
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Segoe UI',Arial,sans-serif;background:#e0e5ec;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;touch-action:pan-y pan-x;}
    .container{background:#e0e5ec;width:100%;max-width:450px;padding:40px 25px;border-radius:35px;box-shadow:10px 10px 20px #a3b1c6,-10px -10px 20px #ffffff;animation:slideUp .6s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    .header{text-align:center;margin-bottom:30px;}
    .logo{width:90px;height:90px;margin:0 auto 15px;background:#e0e5ec;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:45px;box-shadow:8px 8px 15px #a3b1c6,-8px -8px 15px #ffffff;}
    .header h2{font-size:28px;font-weight:800;color:#1a237e;text-shadow:3px 3px 6px #a3b1c6,-3px -3px 6px #ffffff;margin-bottom:5px;}
    .subtitle{color:#1a237e;font-weight:600;font-size:15px;text-shadow:1px 1px 2px #ffffff;margin-bottom:10px;}
    .input-group{position:relative;margin-bottom:20px;}
    .input-group input{width:100%;padding:16px 20px;border:none;border-radius:20px;font-size:16px;background:#e0e5ec;box-shadow:inset 5px 5px 10px #a3b1c6,inset -5px -5px 10px #ffffff;transition:.3s;color:#333;}
    .input-group input:focus{outline:none;box-shadow:inset 7px 7px 15px #a3b1c6,inset -7px -7px 15px #ffffff;}
    .input-group input.error{box-shadow:inset 5px 5px 10px #ffb3b3,inset -5px -5px 10px #ffffff;border:2px solid #ff4757;}
    .eye-icon{position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;color:#1a237e;font-size:20px;background:#e0e5ec;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:3px 3px 6px #a3b1c6,-3px -3px 6px #ffffff;}
    .error-text{color:#ff4757;font-size:13px;margin-top:5px;margin-left:15px;font-weight:500;display:none;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
    .checkbox-group{display:flex;align-items:center;gap:10px;margin:15px 0;color:#333;font-size:15px;}
    .checkbox-group input{width:18px;height:18px;cursor:pointer;accent-color:#1a237e;}
    .forgot-link{display:block;text-align:right;margin:10px 0 20px;color:#1a237e;font-weight:600;cursor:pointer;font-size:14px;padding:5px 10px;border-radius:30px;background:#e0e5ec;box-shadow:3px 3px 6px #a3b1c6,-3px -3px 6px #ffffff;width:fit-content;float:right;}
    .btn-login{width:100%;background:#e0e5ec;border:none;padding:18px;border-radius:30px;font-size:18px;font-weight:800;color:#1a237e;text-transform:uppercase;letter-spacing:2px;cursor:pointer;box-shadow:8px 8px 15px #a3b1c6,-8px -8px 15px #ffffff;transition:.3s;margin:30px 0 20px;}
    .btn-login:active{box-shadow:inset 5px 5px 10px #a3b1c6,inset -5px -5px 10px #ffffff;}
    .btn-login:disabled{opacity:0.6;cursor:not-allowed;}
    .register-footer{text-align:center;font-size:15px;color:#333;text-shadow:1px 1px 2px #ffffff;}
    .register-footer a{color:#1a237e;text-decoration:none;font-weight:700;margin-left:5px;padding:5px 10px;border-radius:20px;background:#e0e5ec;box-shadow:3px 3px 6px #a3b1c6,-3px -3px 6px #ffffff;}
    #loading{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);backdrop-filter:blur(5px);justify-content:center;align-items:center;z-index:1000;}
    .loader{width:60px;height:60px;background:#e0e5ec;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:8px 8px 15px #a3b1c6,-8px -8px 15px #ffffff;}
    .loader div{width:40px;height:40px;border:4px solid #1a237e;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;}
    @keyframes spin{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
    .email-suggestions{position:absolute;top:100%;left:0;right:0;background:#e0e5ec;border-radius:15px;margin-top:5px;padding:10px;box-shadow:5px 5px 10px #a3b1c6,-5px -5px 10px #ffffff;z-index:10;display:none;}
    .email-suggestions.show{display:block;}
    .suggestion-item{padding:10px 15px;border-radius:10px;margin:5px 0;cursor:pointer;transition:0.2s;color:#1a237e;font-weight:500;}
    .suggestion-item:hover{background:#d1d9e6;box-shadow:inset 3px 3px 6px #a3b1c6,inset -3px -3px 6px #ffffff;}
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🔐</div>
    <h2>Login Account</h2>
    <div class="subtitle">Welcome Back!</div>
  </div>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email ID" autocomplete="off" required>
    <div id="emailError" class="error-text"></div>
    <div class="email-suggestions" id="emailSuggestions"></div>
  </div>

  <div class="input-group">
    <input type="password" id="pass" placeholder="Password" required>
    <span class="eye-icon" onclick="togglePass()">👁️</span>
    <div id="passError" class="error-text"></div>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <div class="checkbox-group">
      <input type="checkbox" id="remember">
      <label for="remember">Remember me</label>
    </div>
    <span class="forgot-link" onclick="forgotPassword()">Forgot Password?</span>
  </div>

  <button type="button" id="loginBtn" class="btn-login">LOGIN</button>

  <div class="register-footer">
    Don't have an account? <a href="register.html">Register</a>
  </div>
</div>

<div id="loading">
  <div class="loader"><div></div></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"

const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
const supabase = createClient(supabaseUrl, supabaseKey)

supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    console.log("User logged in")
  }
})

const checkUser = async () => {
  const { data, error } = await supabase.auth.getSession()
  if (error) {
    console.warn("Auth error")
    return
  }
  if (data.session) {
    window.location.replace("dashboard.html")
  }
}
checkUser()

window.togglePass = () => {
  const p = document.getElementById("pass")
  const icon = document.querySelector(".eye-icon")
  if (p.type === "password") {
    p.type = "text"
    icon.textContent = "🙈"
  } else {
    p.type = "password"
    icon.textContent = "👁️"
  }
}

window.forgotPassword = () => {
  window.location.href = "reset-password.html"
}

function showError(inputId, errorId, message) {
  const input = document.getElementById(inputId)
  const error = document.getElementById(errorId)
  input.classList.add('error')
  error.textContent = message
  error.style.display = 'block'
  setTimeout(() => {
    input.classList.remove('error')
    error.style.display = 'none'
  }, 3000)
}

function validateEmail(email) {
  const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
  return re.test(email)
}

document.querySelectorAll('input').forEach(input => {
  input.addEventListener('focus', function() {
    this.classList.remove('error')
    const errorId = this.id + 'Error'
    const errorEl = document.getElementById(errorId)
    if (errorEl) {
      errorEl.style.display = 'none'
    }
  })
})

const emailInput = document.getElementById("email")
const suggestionsBox = document.getElementById("emailSuggestions")
const domains = ["gmail.com", "yahoo.com", "outlook.com", "hotmail.com", "rediffmail.com"]

emailInput.addEventListener("input", () => {
  const value = emailInput.value.trim()
  suggestionsBox.innerHTML = ""

  if (value.includes("@") && !value.split("@")[1].includes(".")) {
    const name = value.split("@")[0]
    const typedDomain = value.split("@")[1] || ""

    domains
      .filter(d => d.startsWith(typedDomain))
      .slice(0, 3)
      .forEach(domain => {
        const item = document.createElement("div")
        item.classList.add("suggestion-item")
        item.textContent = name + "@" + domain

        item.onclick = () => {
          emailInput.value = item.textContent
          suggestionsBox.classList.remove("show")
        }

        suggestionsBox.appendChild(item)
      })

    if (suggestionsBox.children.length > 0) {
      suggestionsBox.classList.add("show")
    } else {
      suggestionsBox.classList.remove("show")
    }
  } else {
    suggestionsBox.classList.remove("show")
  }
})

document.addEventListener("click", (e) => {
  if (!emailInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
    suggestionsBox.classList.remove("show")
  }
})

document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim().toLowerCase()
  const password = document.getElementById("pass").value
  const loginBtn = document.getElementById("loginBtn")

  if (loginBtn.disabled) return

  if (!email) {
    document.getElementById('email').focus()
    showError('email', 'emailError', 'This field is required')
    return
  }

  if (!validateEmail(email)) {
    document.getElementById('email').focus()
    showError('email', 'emailError', 'Please enter a valid email address')
    return
  }

  if (!password) {
    document.getElementById('pass').focus()
    showError('pass', 'passError', 'This field is required')
    return
  }

  if (password.length < 6) {
    document.getElementById('pass').focus()
    showError('pass', 'passError', 'Password must be at least 6 characters')
    return
  }

  loginBtn.disabled = true
  document.getElementById("loading").style.display = "flex"
  document.body.style.overflow = "hidden"
  document.body.style.pointerEvents = "none"
  document.body.style.cursor = "wait"

  try {
    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: password
    })

    if (error) {
      if (error.message.toLowerCase().includes("invalid")) {
        showError('email', 'emailError', 'Invalid email or password')
        showError('pass', 'passError', 'Invalid email or password')
      } else if (error.message.toLowerCase().includes("email not confirmed")) {
        showError('email', 'emailError', 'Please verify your email first')
      } else {
        alert(error.message)
      }
    } else {
      if (document.getElementById('remember').checked) {
        localStorage.setItem('rememberedEmail', email)
        localStorage.setItem('rememberMe', new Date().getTime() + 1296000000)
      } else {
        localStorage.removeItem('rememberedEmail')
        localStorage.removeItem('rememberMe')
      }
      window.location.replace("dashboard.html")
    }
  } catch (err) {
    alert("Something went wrong")
  } finally {
    loginBtn.disabled = false
    document.getElementById("loading").style.display = "none"
    document.body.style.overflow = "auto"
    document.body.style.pointerEvents = "auto"
    document.body.style.cursor = "default"
  }
})

document.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !document.getElementById("loginBtn").disabled) {
    document.getElementById("loginBtn").click()
  }
})

const rememberedEmail = localStorage.getItem('rememberedEmail')
const rememberExpiry = localStorage.getItem('rememberMe')

if (rememberedEmail && rememberExpiry && new Date().getTime() < rememberExpiry) {
  document.getElementById('email').value = rememberedEmail
  document.getElementById('remember').checked = true
}
</script>

</body>
</html>
