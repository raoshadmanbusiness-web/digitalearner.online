<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Withdrawals - Digital Earner</title>
    <link rel="icon" href="logo.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #f3f4f6, #eef2ff);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .admin-container {
            max-width: 900px;
            margin: 20px auto;
            padding: 15px 20px;
        }

        .admin-title {
            font-size: 28px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Summary Card Styles */
        .summary-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            color: white;
        }

        .summary-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
            opacity: 0.9;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .summary-item {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
        }

        .summary-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .summary-value {
            font-size: 24px;
            font-weight: 800;
        }

        .summary-value.pending { color: #f59e0b; }
        .summary-value.approved { color: #10b981; }
        .summary-value.rejected { color: #ef4444; }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab {
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            background: #e2e8f0;
            font-weight: 600;
            transition: 0.2s;
        }

        .tab.active {
            background: #4f46e5;
            color: white;
        }

        .requests-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .request-item {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border-left: 5px solid #f59e0b;
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eef2ff;
        }

        .request-id {
            font-size: 14px;
            color: #64748b;
        }

        .request-date {
            font-size: 12px;
            color: #94a3b8;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-approved {
            background: #d1fae5;
            color: #059669;
        }

        .status-rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .request-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
            margin-top: 2px;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .approve-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .reject-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .approve-btn:disabled, .reject-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .no-requests {
            text-align: center;
            padding: 50px;
            color: #64748b;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-title">💰 Withdrawal Requests</div>
    
    <!-- Summary Card -->
    <div class="summary-card" id="summaryCard" style="display: none;">
        <div class="summary-title">📊 WITHDRAWAL SUMMARY</div>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="summary-label">Pending</div>
                <div class="summary-value pending" id="pendingAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Approved</div>
                <div class="summary-value approved" id="approvedAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Rejected</div>
                <div class="summary-value rejected" id="rejectedAmount">₹0</div>
            </div>
            <div class="summary-item">
                <div class="summary-label">Total Requests</div>
                <div class="summary-value" id="totalRequests">0</div>
            </div>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-status="pending">Pending</div>
        <div class="tab" data-status="approved">Approved</div>
        <div class="tab" data-status="rejected">Rejected</div>
    </div>
    
    <div id="requestsList" class="requests-list">
        <div style="text-align: center; padding: 40px;">Loading requests...</div>
    </div>
</div>

<script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
    
    const supabaseUrl = "https://yqxbwgxfhibbdkgglydw.supabase.co"
    const supabaseKey = "sb_publishable_2yjmy16CcD7Vtn5ydaYkfw_b4CJyz2V"
    const supabase = createClient(supabaseUrl, supabaseKey)
    
    // ==================== ADMIN EMAIL (Private) ====================
    const ADMIN_EMAIL = "raoshadman.business@gmail.com"
    let currentStatus = 'pending'
    
    // ==================== SECURITY: Check Admin from admins table ====================
    async function checkAdmin() {
        const { data: { user } } = await supabase.auth.getUser()
        if (!user) {
            window.location.href = "login.html"
            return false
        }
        
        // Check if user email exists in admins table
        const { data: adminData, error } = await supabase
            .from('admins')
            .select('email')
            .eq('email', user.email)
            .single()
        
        if (error || !adminData) {
            alert("⛔ ACCESS DENIED!\n\nThis page is for authorized admins only.")
            window.location.href = "dashboard.html"
            return false
        }
        
        return true
    }
    
    // ==================== LOAD SUMMARY STATS ====================
    async function loadSummary() {
        const { data: allRequests, error } = await supabase
            .from('withdrawal_requests')
            .select('status, amount')
        
        if (error) {
            console.error("Error loading summary:", error)
            return
        }
        
        let pendingTotal = 0
        let approvedTotal = 0
        let rejectedTotal = 0
        
        for (const req of allRequests) {
            if (req.status === 'pending') {
                pendingTotal += req.amount
            } else if (req.status === 'approved') {
                approvedTotal += req.amount
            } else if (req.status === 'rejected') {
                rejectedTotal += req.amount
            }
        }
        
        document.getElementById('pendingAmount').innerHTML = `₹${pendingTotal.toLocaleString()}`
        document.getElementById('approvedAmount').innerHTML = `₹${approvedTotal.toLocaleString()}`
        document.getElementById('rejectedAmount').innerHTML = `₹${rejectedTotal.toLocaleString()}`
        document.getElementById('totalRequests').textContent = allRequests.length
        
        document.getElementById('summaryCard').style.display = 'block'
    }
    
    async function loadRequests() {
        const { data: requests, error } = await supabase
            .from('withdrawal_requests')
            .select('*')
            .eq('status', currentStatus)
            .order('requested_at', { ascending: false })
        
        const container = document.getElementById('requestsList')
        
        if (error || !requests || requests.length === 0) {
            container.innerHTML = `<div class="no-requests">✅ No ${currentStatus} withdrawal requests</div>`
            return
        }
        
        let html = ''
        for (const req of requests) {
            const date = new Date(req.requested_at).toLocaleString()
            
            html += `
                <div class="request-item" id="req-${req.id}">
                    <div class="request-header">
                        <span class="request-id">#${req.id}</span>
                        <span class="request-date">${date}</span>
                        <span class="status-badge status-${req.status}">${req.status.toUpperCase()}</span>
                    </div>
                    <div class="request-details">
                        <div class="detail-item">
                            <span class="detail-label">User ID</span>
                            <span class="detail-value">${escapeHtml(req.user_id)}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Amount</span>
                            <span class="detail-value">₹${req.amount}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">UPI ID</span>
                            <span class="detail-value">${escapeHtml(req.upi_id)}</span>
                        </div>
                    </div>
            `
            
            if (req.status === 'pending') {
                html += `
                    <div class="action-buttons">
                        <button class="approve-btn" onclick="approveWithdrawal('${req.id}', '${req.user_id}', ${req.amount})">✅ Approve</button>
                        <button class="reject-btn" onclick="rejectWithdrawal('${req.id}', '${req.user_id}', ${req.amount})">❌ Reject</button>
                    </div>
                `
            }
            
            html += `</div>`
        }
        container.innerHTML = html
    }
    
    function escapeHtml(str) {
        if (!str) return ''
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;'
            if (m === '<') return '&lt;'
            if (m === '>') return '&gt;'
            return m
        })
    }
    
    window.approveWithdrawal = async function(id, userId, amount) {
        if (!confirm(`⚠️ Confirm: You have sent ₹${amount} to this user? After payment, click OK.`)) return
        
        const btn = document.querySelector(`#req-${id} .approve-btn`)
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        
        try {
            // Security: Check admin again
            const { data: { user } } = await supabase.auth.getUser()
            const { data: adminCheck } = await supabase
                .from('admins')
                .select('email')
                .eq('email', user.email)
                .single()
            
            if (!adminCheck) {
                throw new Error("Unauthorized access")
            }
            
            const { data: earnings } = await supabase
                .from('user_earnings')
                .select('available_balance')
                .eq('user_id', userId)
                .single()
            
            const newBalance = (earnings?.available_balance || 0) - amount
            
            await supabase
                .from('user_earnings')
                .update({ 
                    available_balance: newBalance,
                    last_updated: new Date().toISOString()
                })
                .eq('user_id', userId)
            
            await supabase
                .from('withdrawal_requests')
                .update({ 
                    status: 'approved', 
                    processed_at: new Date().toISOString(),
                    notes: 'Payment completed'
                })
                .eq('id', id)
            
            alert(`✅ Withdrawal approved! ₹${amount} deducted from user's wallet.`)
            loadSummary()
            loadRequests()
            
        } catch (err) {
            alert("Error processing approval: " + err.message)
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '✅ Approve'
            }
        }
    }
    
    window.rejectWithdrawal = async function(id, userId, amount) {
        if (!confirm("Reject this withdrawal request? Amount will be returned to user's wallet.")) return
        
        const btn = document.querySelector(`#req-${id} .reject-btn`)
        const approveBtn = document.querySelector(`#req-${id} .approve-btn`)
        
        if (btn) {
            btn.disabled = true
            btn.innerHTML = '<span class="loading-spinner"></span> Processing...'
        }
        if (approveBtn) approveBtn.disabled = true
        
        try {
            const { data: { user } } = await supabase.auth.getUser()
            const { data: adminCheck } = await supabase
                .from('admins')
                .select('email')
                .eq('email', user.email)
                .single()
            
            if (!adminCheck) {
                throw new Error("Unauthorized access")
            }
            
            const { data: earnings } = await supabase
                .from('user_earnings')
                .select('available_balance')
                .eq('user_id', userId)
                .single()
            
            const newBalance = (earnings?.available_balance || 0) + amount
            
            await supabase
                .from('user_earnings')
                .update({ 
                    available_balance: newBalance,
                    last_updated: new Date().toISOString()
                })
                .eq('user_id', userId)
            
            await supabase
                .from('withdrawal_requests')
                .update({ 
                    status: 'rejected', 
                    processed_at: new Date().toISOString(),
                    notes: 'Rejected by admin, amount returned'
                })
                .eq('id', id)
            
            alert(`❌ Withdrawal rejected! ₹${amount} returned to user's wallet.`)
            loadSummary()
            loadRequests()
            
        } catch (err) {
            alert("Error rejecting request: " + err.message)
            if (btn) {
                btn.disabled = false
                btn.innerHTML = '❌ Reject'
            }
            if (approveBtn) approveBtn.disabled = false
        }
    }
    
    // Tab functionality
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
            tab.classList.add('active')
            currentStatus = tab.getAttribute('data-status')
            loadRequests()
        })
    })
    
    // Initialize
    async function init() {
        const isAdmin = await checkAdmin()
        if (!isAdmin) return
        
        await loadSummary()
        await loadRequests()
    }
    
    init()
</script>

</body>
</html>
